name: Release Gate

on:
  push:
    tags:
      - "v*"

jobs:
  gated-release-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest build
      - name: Enforce release gates
        run: |
          python scripts/check_version_parity.py
          python scripts/validate_install_and_cli.py
          python scripts/validate_receipts.py
          pytest -q tests/test_mirroros_contract.py tests/test_api_gate.py tests/test_release_version_parity.py
          python -m build
